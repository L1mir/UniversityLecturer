<th:block th:fragment="teacherTable(teachers)">
    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Отчество</th>
            <th>Кафедра</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="teacher, iterStat : ${teachers}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${teacher.firstName}"></td>
            <td th:text="${teacher.lastName}"></td>
            <td th:text="${teacher.patronymic}"></td>
            <td th:text="${teacher.department}"></td>
        </tr>
        </tbody>
    </table>
</th:block>
