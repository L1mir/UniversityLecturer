<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поиск пользователя</title>
    <link rel="stylesheet" href="/static/search-style.css">
    <link rel="stylesheet" th:href="@{/search-style.css}">
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 20px;
        }

        th:first-child, td:first-child {
            width: 2%;
            text-align: center;
            background-color: #ffffff;
        }

        th:nth-child(2), td:nth-child(2) {
            width: 20%;
        }

        th:nth-child(3), td:nth-child(3) {
            width: 20%;
        }

        th:nth-child(4), td:nth-child(4) {
            width: 5%;
        }

        th:nth-child(5), td:nth-child(5) {
            width: 5%;
            text-align: center;
        }

        th, td {
            border: none;
            border-bottom: 1px solid #e9e9e7;
            padding: 12px 8px;
            text-align: left;
        }

        th {
            vertical-align: middle;
            background-color: #ffffff;
            font-weight: bold;
            color: #000000;
        }

        tr:hover {
            background-color: #D3D3D3;
        }

        tr:hover td:first-child {
            background-color: #D3D3D3;
        }

        .role-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .role-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            min-width: 60px;
            text-align: center;
        }

        .role-admin {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .role-user {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }

        .btn {
            padding: 4px 10px;
            cursor: pointer;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-delete {
            background-color: #d44c47;
            color: white;
        }

        .btn-edit {
            background-color: #37352f;
            color: white;
        }

        .search-result {
            margin-top: 30px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="search-container">
    <h2>Найти пользователя по email</h2>

    <form class="search-form" th:action="@{/admin/users/find_user_by_email_panel}" method="get">
        <div class="input-group">
            <label for="email">Введите email пользователя</label>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="example@mail.com"
                   required>
            <button type="submit">Найти пользователя</button>
        </div>
    </form>

    <div class="search-result" th:if="${users != null}">
        <h3>Результат поиска:</h3>
        <div th:replace="fragments/user_table :: userTable(${users}, ${true}, ${true})"></div>
    </div>

    <div class="no-results" th:if="${searched and users == null}">
        Пользователь с таким email не найден
    </div>
</div>
</body>
</html>
