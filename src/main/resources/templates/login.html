<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Вход в систему</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #667eea;
      outline: none;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 5px;
      color: #666;
      font-size: 14px;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    a {
      color: #667eea;
      text-decoration: none;
      margin-left: 15px;
    }

    a:hover {
      text-decoration: underline;
    }

    .error {
      color: #e74c3c;
      background: #fdf0ed;
      padding: 10px;
      border-radius: 5px;
      margin: 15px 0;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
  </style>
</head>
<body>
<div class="login-container">
  <h1>Вход в систему</h1>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label>Email:</label>
      <input type="email" name="email" placeholder="Введите email" required>
    </div>

    <div class="form-group">
      <label>Пароль:</label>
      <input type="password" name="password" placeholder="Введите пароль" required>
    </div>

    <div th:if="${param.error}" class="error">
      Неверный email или пароль
    </div>

    <div style="margin-top: 25px;">
      <button type="submit">Войти</button>
      <a th:href="@{/register}">Зарегистрироваться</a>
    </div>
  </form>
</div>
</body>
</html>
