<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление пользователями</title>
    <style>
        body {
            background: #FAF9FF;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: left;
            color: #37352f;
            font-weight: 400;
            margin-bottom: 30px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
            border-radius: 3px;
            overflow: hidden;
        }

        th:first-child, td:first-child {
            width: 3%;
            text-align: center;
            background-color: #ffffff;
        }

        th:nth-child(2), td:nth-child(2) {
            width: 15%;
        }

        th:nth-child(3), td:nth-child(3) {
            width: 15%;
        }

        th:nth-child(4), td:nth-child(4) {
            width: 13%;
        }

        th:nth-child(5), td:nth-child(5) {
            width: 10%;
            text-align: center;
        }

        th, td {
            border: none;
            border-bottom: 1px solid #e9e9e7;
            padding: 12px 8px;
            text-align: left;
        }

        th {
            vertical-align: middle;
            background-color: #ffffff;
            font-weight: bold;
            color: #000000;
        }

        tr:hover {
            background-color: #D3D3D3;
        }

        tr:hover td:first-child {
            background-color: #D3D3D3;
        }

        .role-form {
            display: inline-block;
            margin-left: 10px;
        }

        .role-select {
            padding: 4px;
            margin-right: 5px;
            border: 1px solid #e3e3e0;
            border-radius: 4px;
        }

        .btn {
            padding: 4px 10px;
            cursor: pointer;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-delete {
            background-color: #d44c47;
            color: white;
        }

        .btn-edit {
            background-color: #37352f;
            color: white;
        }
    </style>
</head>
<body>
<h1>Пользователи</h1>

<table>
    <thead>
    <tr>
        <th>#</th>
        <th>Логин</th>
        <th>Email</th>
        <th>Роль</th>
        <th>Удаление пользователя</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user, iterStat: ${users}">
        <td th:text="${iterStat.count}">1</td>
        <td th:text="${user.name}">test11</td>
        <td th:text="${user.email}">test11@mail.com</td>
        <td>
            <span th:text="${user.getRole().name}">admin</span>
            <form class="role-form" th:action="@{/users/{id}/role(id=${user.id})}" method="post">
                <select name="role" class="role-select">
                    <option value="admin" th:selected="${user.role == 'admin'}">admin</option>
                    <option value="user" th:selected="${user.role == 'user'}">user</option>
                </select>
                <button type="submit" class="btn btn-edit">изменить</button>
            </form>
        </td>
        <td>
            <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post"
                  onsubmit="return confirm('Вы уверены, что хотите удалить этого пользователя?');">
                <button type="submit" class="btn btn-delete">удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
