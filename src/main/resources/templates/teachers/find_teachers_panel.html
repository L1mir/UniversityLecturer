<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все преподаватели</title>
</head>
<body>
<div class="container">
    <h1>Преподаватели</h1>
    <style>

        h1 {
            text-align: left;
            color: #37352f;
            font-weight: 400;
            margin-bottom: 30px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
            border-radius: 3px;
            overflow: hidden;
        }

        th:first-child, td:first-child {
            width: 2%;
            text-align: center;
            background-color: #ffffff;
        }

        th:nth-child(2), td:nth-child(2) {
            width: 15%;
        }

        th:nth-child(3), td:nth-child(3) {
            width: 20%;
        }

        th:nth-child(4), td:nth-child(4) {
            width: 20%;
        }

        th:nth-child(5), td:nth-child(5) {
            width: 35%;
            text-align: center;
        }

        th:nth-child(6), td:nth-child(6) {
            width: 10%;
            text-align: center;
        }

        th, td {
            border: none;
            border-bottom: 1px solid #e9e9e7;
            padding: 12px 8px;
            text-align: left;
        }

        th {
            vertical-align: middle;
            background-color: #ffffff;
            font-weight: bold;
            color: #000000;
        }

        tr:hover {
            background-color: #D3D3D3;
        }

        tr:hover td:first-child {
            background-color: #D3D3D3;
        }

        .role-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .role-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            min-width: 60px;
            text-align: center;
        }

        .role-admin {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .role-user {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }

        body {
            background: #FAF9FF;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .btn {
            padding: 4px 10px;
            cursor: pointer;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-delete {
            background-color: #d44c47;
            color: white;
        }

        .btn-edit {
            background-color: #37352f;
            color: white;
        }
    </style>
    <table>
        <tbody>
        <tr th:each="teacher, iterStat : ${teachers}">
            <td th:text="${iterStat.count}">1</td>
            <td th:text="${teacher.firstName}">Иван</td>
            <td th:text="${teacher.lastName}">Иванов</td>
            <td th:text="${teacher.patronymic}">Иванович</td>
            <td th:text="${teacher.department}">Кафедра</td>
            <td>
                <form th:action="@{/teachers/{id}/edit(id=${teacher.id})}" method="get">
                    <button type="submit" class="btn btn-edit">изменить</button>
                </form>

                <form th:action="@{/teachers/{id}/delete(id=${teacher.id})}" method="post"
                      onsubmit="return confirm('Удалить преподавателя?');">

                    <input type="hidden" name="_method" value="DELETE"/>

                    <button type="submit" class="btn btn-delete">удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
        <tbody>
        <tr>
            <td>1</td>
            <td>Иван</td>
            <td>Иванов</td>
            <td>Иванович</td>
            <td>Кафедра информатики</td>
            <td>
                <button class="btn btn-edit">изменить</button>
                <button class="btn btn-delete">удалить</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
