<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Удалить пользователя</title>
    <link rel="stylesheet" th:href="@{/search-style.css}">
    <link rel="stylesheet" href="/static/search-style.css">
    <link rel="stylesheet" href="/static/table-style.css">
</head>
<body>
<div class="search-container">
    <h2>Удалить пользователя</h2>

    <form class="search-form" th:action="@{/admin/users/delete_user_panel}" method="get">
        <div class="input-group">
            <label for="login">Введите логин пользователя</label>
            <input type="text"
                   id="login"
                   name="login"
                   placeholder="Введите логин пользователя">
        </div>

        <div class="input-group">
            <label for="email">Введите email пользователя</label>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="Введите email пользователя">
        </div>

        <div class="input-group">
            <label for="role">Выберите роль пользователя</label>
            <input type="text"
                   id="role"
                   name="role"
                   placeholder="Выберите роль пользователя">
        </div>

        <button type="submit">Найти пользователя</button>
    </form>

    <div class="search-result" th:if="${users != null and !#lists.isEmpty(users)}">
        <h3>Результат поиска:</h3>
        <div th:replace="fragments/user_table :: userTable(${users}, ${false}, ${true})"></div>
    </div>

    <div class="no-results"
         th:if="${searched and (users == null or #lists.isEmpty(users))}">
        Пользователь не найден
    </div>
</div>
</body>
</html>
